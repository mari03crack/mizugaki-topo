function render(list){
  const results=document.getElementById("results");
  results.innerHTML="";

  list.forEach(r=>{

    const images = r.slice(6);

    const imageHtml = images.map(img => `
      <a href="${img}" target="_blank">
        <img src="${img}">
      </a>
    `).join("");

    results.innerHTML+=`
      <div class="card">
        <h2>${r[0]}</h2>
        <p>
          <b>エリア:</b> ${r[1]}<br>
          <b>グレード:</b> ${r[2]}　
          <b>長さ:</b> ${r[3]}<br>
          <b>推奨カム:</b> ${r[4]}　
          <b>向き:</b> ${r[5]}
        </p>
        ${imageHtml}
      </div>`;
  });
}

function normalize(text) {
  return String(text)

    // ひらがな→カタカナ
    .replace(/[ぁ-ん]/g, s =>
      String.fromCharCode(s.charCodeAt(0) + 0x60)
    )

    .toLowerCase()

    // 全角英数字→半角
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g, s =>
      String.fromCharCode(s.charCodeAt(0) - 0xFEE0)
    )

    .replace(/＃/g, "#")
    .replace(/ｍ/g, "m")
    .replace(/Ｍ/g, "m")
    .replace(/　/g, " ")
    .replace(/\s+/g, "");
}

render(routes);

document.getElementById("search").addEventListener("input", function(){

const kw = normalize(this.value);

const filtered = routes.filter(r => {


const name = normalize(r[0]);
const area = normalize(r[1]);
const grade = normalize(r[2]);
const length = normalize(r[3]);
const cam = normalize(r[4]);
const direction = normalize(r[5]);

// 空欄なら全部表示
if (kw === "") return true;

// #6 などのカム検索
if (kw.startsWith("#")) {

  const target = parseFloat(kw.replace("#", ""));

  const numbers = cam.match(/\d+(\.\d+)?/g);

  if (!numbers) return false;

  const values = numbers.map(Number);

  const maxCam = Math.max(...values);

  return maxCam >= target;
}

// 長さ検索
if (kw.endsWith("m")) {

  const target = parseInt(kw);

  const routeLength = parseInt(length);

  if (isNaN(target) || isNaN(routeLength)) {
    return false;
  }

  const minLength = Math.max(1, target - 4);

  return (
    routeLength >= minLength &&
    routeLength <= target
  );
}

// 通常検索
return (
  name.includes(kw) ||
  area.includes(kw) ||
  grade.includes(kw) ||
  direction.includes(kw)
);


});

render(filtered);

});
